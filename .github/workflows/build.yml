name: Build YYC Toolbox

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg integrate install
          C:\vcpkg\vcpkg install lua:x64-windows
      - name: List vcpkg lib (debug)
        run: dir C:\vcpkg\installed\x64-windows\lib
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Build
        run: msbuild InternalDLL.sln /p:Configuration=Release /p:Platform=x64 /p:VcpkgEnabled=true /p:VcpkgRoot=C:\vcpkg\